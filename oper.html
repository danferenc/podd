<script>

const ws = new WebSocket("wss://podd-hhtr.onrender.com/")

ws.onopen = () => {

    ws.send(JSON.stringify({
        role: "operator"
    }))
}

ws.onmessage = (event) => {

    const msg = JSON.parse(event.data)

    console.log(msg)
}

function reply(){

    const text = document.getElementById("msg").value
    const client = document.getElementById("client").value

    ws.send(JSON.stringify({
        client_id: client,
        text: text
    }))
}

</script>

Client:
<input id="client">

Message:
<input id="msg">

<button onclick="reply()">Send</button>
