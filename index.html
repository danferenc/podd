<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support Chat</title>

<style>

body{
    font-family: Arial;
    max-width:600px;
    margin:auto;
}

#chat{
    height:400px;
    border:1px solid #ccc;
    padding:10px;
    overflow-y:auto;
}

#status{
    margin-bottom:10px;
    font-size:14px;
}

.message{
    margin:5px 0;
}

.you{
    color:blue;
}

.support{
    color:green;
}

</style>
</head>

<body>

<h2>Support Chat</h2>

<div id="status">Connecting...</div>

<div id="chat"></div>

<input id="msg" placeholder="Type message..." style="width:80%">
<button onclick="sendMessage()">Send</button>

<script>

let ws
let reconnectTimer = null

function connect(){

    ws = new WebSocket("wss://podd-hhtr.onrender.com")

    ws.onopen = ()=>{

        console.log("connected")

        document.getElementById("status").innerText="Connected"

        ws.send(JSON.stringify({
            role:"client"
        }))
    }

    ws.onmessage = (event)=>{

        const msg = JSON.parse(event.data)

        if(msg.type==="reply"){
            addMessage("Support",msg.text,"support")
        }

    }

    ws.onclose = ()=>{

        console.log("connection lost")

        document.getElementById("status").innerText="Disconnected"

        if(!reconnectTimer){

            reconnectTimer=setTimeout(()=>{
                reconnectTimer=null
                connect()
            },5000)

        }

    }

}

connect()
</script>

</body>
</html>
