<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support Chat</title>

<style>

body{
    font-family: Arial;
    max-width:600px;
    margin:auto;
}

#chat{
    height:400px;
    border:1px solid #ccc;
    padding:10px;
    overflow-y:auto;
}

#status{
    margin-bottom:10px;
    font-size:14px;
}

.message{
    margin:5px 0;
}

.you{
    color:blue;
}

.support{
    color:green;
}

</style>
</head>

<body>

<h2>Support Chat</h2>

<div id="status">Connecting...</div>

<div id="chat"></div>

<input id="msg" placeholder="Type message..." style="width:80%">
<button onclick="sendMessage()">Send</button>

<script>

let ws
let heartbeat
let connected=false

function connect(){

    ws = new WebSocket("wss://podd-hhtr.onrender.com")

    ws.onopen = ()=>{

        connected=true

        document.getElementById("status").innerText="Connected"

        ws.send(JSON.stringify({
            role:"client"
        }))

        startHeartbeat()
    }

    ws.onmessage = (event)=>{

        const msg = JSON.parse(event.data)

        if(msg.type==="reply"){

            addMessage("Support",msg.text,"support")

        }

        if(msg.type==="pong"){

            console.log("heartbeat ok")

        }

    }

    ws.onclose = ()=>{

        connected=false

        document.getElementById("status").innerText="Disconnected - reconnecting..."

        stopHeartbeat()

        setTimeout(connect,3000)

    }

    ws.onerror = ()=>{

        ws.close()

    }

}

function startHeartbeat(){

    heartbeat=setInterval(()=>{

        if(ws && connected){

            ws.send(JSON.stringify({
                type:"ping"
            }))

        }

    },5000)

}

function stopHeartbeat(){

    clearInterval(heartbeat)

}

function sendMessage(){

    const input=document.getElementById("msg")

    const text=input.value.trim()

    if(!text) return

    if(!connected){

        alert("Not connected")

        return
    }

    ws.send(JSON.stringify({
        text:text
    }))

    addMessage("You",text,"you")

    input.value=""

}

function addMessage(user,text,cls){

    const chat=document.getElementById("chat")

    const div=document.createElement("div")

    div.className="message "+cls

    div.innerText=user+": "+text

    chat.appendChild(div)

    chat.scrollTop=chat.scrollHeight

}

connect()

</script>

</body>
</html>
